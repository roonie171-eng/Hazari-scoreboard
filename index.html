<script>
let deferredPrompt;
window.addEventListener('beforeinstallprompt',(e)=>{
 e.preventDefault();
 deferredPrompt=e;
 const b=document.getElementById('installBtn');
 if(b) b.style.display='inline-block';
});
async function installPWA(){
 if(!deferredPrompt) return;
 deferredPrompt.prompt();
 await deferredPrompt.userChoice;
}
if('serviceWorker' in navigator){
 window.addEventListener('load',()=>navigator.serviceWorker.register('./service-worker.js'));
}
</script>

<script>

function colorHex(name){
 const map={Blue:'#3b82f6',Red:'#ef4444',Green:'#22c55e',Purple:'#a855f7',Orange:'#f97316',Pink:'#ec4899',Teal:'#14b8a6',Gold:'#eab308',Brown:'#92400e',Black:'#111827'};

}

function selectColor(i,c){
 let inp=document.getElementById('cl'+i);
 if(inp) inp.value=c;
 document.querySelectorAll('.colorSwatch[data-player="'+i+'"]').forEach(el=>{
  el.style.border = el.getAttribute('data-color')===c ? '2px solid #fff' : '2px solid transparent';
 });

 if(prev) prev.style.background=colorHex(c);

}

function toggleColorPicker(i){

 if(!picker) return;
 let isOpen=picker.style.display==='flex';
 document.querySelectorAll('[id^="clPicker"]').forEach(el=>el.style.display='none');
 picker.style.display=isOpen?'none':'flex';
}
const DEFAULT_COLORS=['Blue','Red','Green','Purple','Orange','Pink','Teal','Gold'];

<script>
let historyVisible=false; let gameStoryVisible=false;
let totals=[],names=[],history=[],roundNo=0; let winnerShown=false; let editingRoundIndex=null;
let presetPlayers=JSON.parse(localStorage.getItem('hazariPresetPlayers')||'["রনি","বক্কর","হাসান","স্বাধীন","তারেক","পারভেজ","মুসা","তুহিন"]');


document.addEventListener('change',function(e){
 if(e.target.id && e.target.id.startsWith('n')){
   let i=e.target.id.substring(1);
   let c=document.getElementById('c'+i);
   if(c) c.style.display = e.target.value==='' ? 'inline-block':'none';
 }
});

function save(){localStorage.hazari=JSON.stringify({totals,names,history,roundNo,target:target.value});}

function setup(){
 let n=+pc.value;
 totals=new Array(n).fill(0); history=[]; winnerShown=false; tieAnnounced=false; lastAnnouncedLeader=null;
 let h='<div class="card">';
 
for(let i=0;i<n;i++){
 let colorList=['Blue','Red','Green','Purple','Orange','Pink','Teal','Gold','Brown','Black'];
 let defColor=colorList[i%colorList.length];
 h+=`<div style="margin:8px 0">`;
 h+=`<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap"><select class="nameSel" id="n${i}" style="font-size:12px;max-width:90px;flex:0 0 auto">
 <option value="">✏️ Custom Name...</option>
 <option>রনি</option><option>বক্কর</option><option>হাসান</option>
 <option>স্বাধীন</option><option>তারেক</option><option>পারভেজ</option>
 <option>মুসা</option><option>তুহিন</option>
 </select> <select id="a${i}" style="font-size:12px;flex:0 0 auto">${DEFAULT_EMOJIS.map((e,x)=>`<option ${x===i?'selected':''}>${e}</option>`).join('')}</select> <span onclick="toggleColorPicker(${i})" style="display:inline-flex;align-items:center;gap:5px;background:#fff;color:#111827;border-radius:8px;padding:6px 8px;font-size:12px;cursor:pointer;flex:0 0 auto"><span id="clPreview${i}" style="width:16px;height:16px;border-radius:50%;background:${colorHex(defColor)};display:inline-block"></span>Color ▾</span> <input id="c${i}" placeholder="Custom" style="display:none;max-width:90px"></div>`;
 h+=`<input type="hidden" id="cl${i}" value="${defColor}">`;
 h+=`<div id="clPicker${i}" style="display:none;gap:6px;flex-wrap:wrap;margin-top:6px">${colorList.map(c=>`<span class="colorSwatch" data-player="${i}" data-color="${c}" onclick="selectColor(${i},'${c}')" style="width:22px;height:22px;border-radius:50%;background:${colorHex(c)};display:inline-block;cursor:pointer;border:2px solid ${c===defColor?'#fff':'transparent'}"></span>`).join('')}</div>`;
 h+=`</div>`;
}

 h+='<button onclick="startGame()">Start</button></div>';
 app.innerHTML=h;
}

function startGame(){
 names=[];
 let h='<div class="card"><b>Round Total: '+(totals.length*90)+'</b><br>';
 h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:2px 10px;margin-top:6px">';
 for(let i=0;i<totals.length;i++){
  let sel=document.getElementById('n'+i).value;
let nm=sel || document.getElementById('c'+i).value || ('Player '+(i+1));
names.push(nm); presetPlayers[i]=nm;
playerEmojis[i+1]=document.getElementById('a'+i)?.value||'😀';
playerColors[i+1]=document.getElementById('cl'+i)?.value||'Blue';
localStorage.setItem('playerEmojis',JSON.stringify(playerEmojis));
localStorage.setItem('playerColors',JSON.stringify(playerColors));
  h+=`<div class="player-entry"><span class="pname">${names[i]}</span><input type=number inputmode="numeric" pattern="[0-9]*" id=s${i} value="" onkeydown="handleScoreKey(event,${i})"></div>`;
 }
 h+='</div>';
 h+='<div class="actionRow"><button title="Add Round" onclick="addRound()">➕</button><button title="Undo" onclick="undo()">↩️</button><button id="lockBtn" title="Round Lock" onclick="toggleRoundLock()">🔒</button><button title="Game Story" onclick="toggleGameStory()">📜</button><button title="History" onclick="toggleHistory()">📖</button></div><div id=board></div></div>';
 localStorage.setItem('hazariPresetPlayers',JSON.stringify(presetPlayers)); app.innerHTML=h; render(); updateLockButton();
}

let lastAnnouncedLeader=null;
let tieAnnounced=false;

function setTargetValue(v){
 let t=document.getElementById('target');
 if(!t) return;
 if(t.tagName==='SELECT'){
   let opt=Array.from(t.options).find(o=>+o.value===+v);
   if(!opt){
     opt=document.createElement('option');
     opt.value=v; opt.textContent=v;
     t.appendChild(opt);
   }
 }
 t.value=v;
}

function extendTarget(){
 let input=document.getElementById('newTarget');
 let errEl=document.getElementById('tieErr');
 if(!input) return;
 let v=+input.value;
 let currentMax=totals.length?Math.max(...totals):0;
 if(!v || v<=currentMax){
   if(errEl) errEl.textContent='নতুন টার্গেট বর্তমান সর্বোচ্চ স্কোর ('+currentMax+') এর চেয়ে বেশি হতে হবে।';
   return;
 }
 setTargetValue(v);
 tieAnnounced=false;
 winnerShown=false;
 showToast('নতুন টার্গেট: '+v+' পয়েন্ট!','🎯');
 speak('নতুন টার্গেট সেট হয়েছে '+v+' পয়েন্ট। খেলা চলবে!');
 save();
 render();
}

function showToast(msg,emoji){
 const c=document.getElementById('toastContainer');
 if(!c) return;
 const el=document.createElement('div');
 el.className='toast';
 el.innerHTML=(emoji||'🔔')+' '+msg;
 c.appendChild(el);
 setTimeout(()=>{ el.remove(); },3000);
}

function speak(text){
 try{
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='bn-BD';
  u.rate=0.95;
  window.speechSynthesis.speak(u);
 }catch(e){}
}

function getAudioCtx(){
 try{
  if(!window._audioCtx){ window._audioCtx=new (window.AudioContext||window.webkitAudioContext)(); }
  if(window._audioCtx.state==='suspended') window._audioCtx.resume();
  return window._audioCtx;
 }catch(e){ return null; }
}

function playTone(freq,duration,type,delay,vol){
 try{
  let ctx=getAudioCtx();
  if(!ctx) return;
  let osc=ctx.createOscillator();
  let gain=ctx.createGain();
  osc.type=type||'sine';
  osc.frequency.value=freq;
  let startTime=ctx.currentTime+(delay||0);
  let v=vol!=null?vol:0.15;
  gain.gain.setValueAtTime(0.0001,startTime);
  gain.gain.linearRampToValueAtTime(v,startTime+0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001,startTime+duration);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(startTime);
  osc.stop(startTime+duration+0.03);
 }catch(e){}
}

function playLeaderSound(){ playTone(880,0.14,'triangle',0,0.15); playTone(1175,0.18,'triangle',0.12,0.15); }
function playSweepSound(){ playTone(660,0.09,'square',0,0.16); playTone(880,0.09,'square',0.09,0.16); playTone(1320,0.2,'square',0.18,0.16); }
function playWinnerSound(){ [523.25,659.25,783.99,1046.5].forEach((f,i)=>playTone(f,0.22,'triangle',i*0.15,0.18)); }
function playTieSound(){ playTone(440,0.2,'sawtooth',0,0.12); playTone(415,0.22,'sawtooth',0.18,0.12); }
function playWarnSound(){ playTone(220,0.28,'square',0,0.15); }

function showWarningPopup(need,sum){
 let diff=sum-need;
 let diffLine = diff>0
   ? ('❌ <b>'+diff+'</b> পয়েন্ট বেশি হয়ে গেছে')
   : diff<0
     ? ('❌ <b>'+Math.abs(diff)+'</b> পয়েন্ট কম হয়ে গেছে')
     : '';
 document.getElementById('warnText').innerHTML =
   'রাউন্ড টোটাল হতে হবে ঠিক <b>'+need+'</b> পয়েন্ট।<br>'+
   'আপনি দিয়েছেন <b>'+sum+'</b> পয়েন্ট।<br>'+
   diffLine+'<br>'+
   'দয়া করে স্কোর ঠিক করুন।';
 document.getElementById('warnModal').style.display='block';
 playWarnSound();
}

function handleScoreKey(e,i){
 if(e.key==='Enter'){
  e.preventDefault();
  if(i<totals.length-1){
   let next=document.getElementById('s'+(i+1));
   if(next){ next.focus(); if(next.select) next.select(); }
  }else{
   addRound();
  }
 }
}

function addRound(){
 let need=totals.length*90,sum=0,r=[];
 for(let i=0;i<totals.length;i++){let v=+(document.getElementById('s'+i).value||0);sum+=v;r.push(v);}
 if(sum!==need){showWarningPopup(need,sum);return;}
 if(editingRoundIndex!==null){
   history[editingRoundIndex]=r;
   editingRoundIndex=null;
 }else{
   history.push(r);
   roundNo++;
   let nonZero=r.filter(v=>v>0);
   if(nonZero.length===1 && nonZero[0]===need){
     let idx=r.indexOf(need);
     showToast(names[idx]+' একাই পুরো '+need+' পয়েন্ট পেয়েছেন! 🔥','🔥');
     playSweepSound();
     speak(names[idx]+' একাই পুরো '+need+' পয়েন্ট পেয়ে গেছেন! অসাধারণ!');
   }
 }
 // Recalculate totals from history
 totals = new Array(totals.length).fill(0);
 history.forEach(rr=>rr.forEach((v,i)=>totals[i]+=v));

function ordinalBn(n){
 const suf={1:'ম',2:'য়',3:'য়'};
 return n+(suf[n]||'তম');
}

function buildSmartTimeline(){
 let n=names.length;
 let need=n*90;
 if(!history.length){
   return {html:'<i>এখনো কোনো রাউন্ড খেলা হয়নি।</i>',sweepCount:0,leaderRoundsCount:new Array(n).fill(0),biggestComeback:null,leaderChain:[],need};
 }
 let totalsRun=new Array(n).fill(0);
 let currentLeader=null;
 let sweepCount=0;
 let milestone90=false;
 let events=[];
 let comebacks=[];
 let leaderChain=[];
 let leaderRoundsCount=new Array(n).fill(0);
 let targetVal=+target.value||1000;

 history.forEach((r,ri)=>{
  let prevTotals=[...totalsRun];
  totalsRun=totalsRun.map((v,i)=>v+(r[i]||0));

  let prevRankOrder=[...Array(n).keys()].sort((a,b)=>prevTotals[b]-prevTotals[a]);
  let newRankOrder=[...Array(n).keys()].sort((a,b)=>totalsRun[b]-totalsRun[a]);
  let prevPos={}; prevRankOrder.forEach((p,idx)=>prevPos[p]=idx);

  let roundEvents=[];

  // 1. Sweep
  let nonZero=r.filter(v=>v>0);
  if(nonZero.length===1 && nonZero[0]===need){
   let idx=r.indexOf(need);
   sweepCount++;
   let emoji=sweepCount===1?'🔥':'⚡';
   let txt=sweepCount===1?(names[idx]+' প্রথম '+need+' মারে'):(names[idx]+' আবার '+need+' মারে');
   roundEvents.push({emoji,txt});
  }

  // 2. Tie at top or leader change
  let topScore=totalsRun[newRankOrder[0]];
  let secondScore=n>1?totalsRun[newRankOrder[1]]:null;
  if(n>1 && topScore===secondScore && topScore>0){
   roundEvents.push({emoji:'⚔️',txt:names[newRankOrder[0]]+' ও '+names[newRankOrder[1]]+' সমান স্কোরে'});
  }else{
   let newLeaderIdx=newRankOrder[0];
   if(currentLeader===null){
    currentLeader=newLeaderIdx;
    leaderChain.push({round:ri+1,player:newLeaderIdx});
   }else if(newLeaderIdx!==currentLeader){
    let prevPosOfNewLeader=prevPos[newLeaderIdx];
    if(prevPosOfNewLeader>=2){
     roundEvents.push({emoji:'🚀',txt:names[newLeaderIdx]+' '+ordinalBn(prevPosOfNewLeader+1)+' থেকে '+ordinalBn(1)+' স্থানে উঠে'});
    }else{
     roundEvents.push({emoji:'👑',txt:names[newLeaderIdx]+' নতুন Leader হয়'});
    }
    currentLeader=newLeaderIdx;
    leaderChain.push({round:ri+1,player:newLeaderIdx});
   }
  }
  if(currentLeader!==null) leaderRoundsCount[currentLeader]++;

  // 3. Track rank-improvement candidates for "Biggest Comeback"
  let newPos={}; newRankOrder.forEach((p,idx)=>newPos[p]=idx);
  for(let p=0;p<n;p++){
   let improve=prevPos[p]-newPos[p];
   if(improve>0) comebacks.push({round:ri+1,player:p,improve});
  }

  // 4. 90% milestone
  if(!milestone90 && topScore>=0.9*targetVal && topScore<targetVal){
   milestone90=true;
   roundEvents.push({emoji:'🏆',txt:names[newRankOrder[0]]+' Target-এর 90% ছোঁয়'});
  }

  // 5. Win
  if(topScore>=targetVal){
   roundEvents.push({emoji:'🎉',txt:names[newRankOrder[0]]+' ম্যাচ জিতে নেয়'});
  }

  roundEvents.forEach(ev=>events.push({round:ri+1,emoji:ev.emoji,txt:ev.txt}));
 });

 let biggestComeback=null;
 comebacks.forEach(c=>{ if(!biggestComeback || c.improve>biggestComeback.improve) biggestComeback=c; });
 if(biggestComeback && biggestComeback.improve>=2){
  events.push({round:biggestComeback.round,emoji:'📈',txt:names[biggestComeback.player]+' Biggest Comeback করে'});
 }

 events.sort((a,b)=>a.round-b.round);

 let html='';
 events.forEach(ev=>{ html+='<div class="lr-row"><b>R'+ev.round+'</b> '+ev.emoji+' '+ev.txt+'</div>'; });
 if(!html) html='<i>এখনো উল্লেখযোগ্য কোনো ঘটনা ঘটেনি।</i>';

 return {html,sweepCount,leaderRoundsCount,biggestComeback,leaderChain,need};
}

 let prevPos={}; prevRankOrder.forEach((idx,pos)=>prevPos[idx]=pos);

 function trendOf(pIdx,i){
   let label='–', color='#9ca3af';
   if(history.length>=2){
     let diff=prevPos[pIdx]-i;
     if(i===0 && prevPos[pIdx]!==0){ label='New Leader'; color='#fbbf24'; }
     else if(diff>0){ label='▲ '+diff+' Up'; color='#22c55e'; }
     else if(diff<0){ label='▼ '+Math.abs(diff)+' Down'; color='#ef4444'; }
   }
   return {label,color};
 }

 let top3=rank.slice(0,3), rest=rank.slice(3);

 if(top3.length){
  let order=top3.length>=2?[1,0,2]:[0]; // left:2nd, center:1st, right:3rd
  let heights=['100px','72px','52px'];
  let medals=['🥇','🥈','🥉'];
  h+='<div style="display:flex;align-items:flex-end;justify-content:center;gap:8px;margin:10px 0">';
  order.forEach((oi,slot)=>{
   let p=top3[oi];
   if(!p){ h+='<div style="flex:1"></div>'; return; }
   let pIdx=names.indexOf(p.n);
   let tr=trendOf(pIdx,oi);
   let barColor = oi===0?'linear-gradient(180deg,#fbbf24,#b45309)':oi===1?'linear-gradient(180deg,#cbd5e1,#64748b)':'linear-gradient(180deg,#f0b28c,#9a5b32)';
   h+='<div style="flex:1;text-align:center">';
   h+='<span class="avatar" style="width:40px;height:40px;font-size:16px;margin:0 auto 4px;display:flex">'+(playerEmojis[pIdx+1]||p.n[0]||'P')+'</span>';
   h+='<div style="font-weight:bold;font-size:12px;color:'+(playerColors[pIdx+1]||'inherit')+';white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+p.n+'</div>';
   h+='<div style="font-size:10px;opacity:.85;color:'+tr.color+';white-space:nowrap">'+p.s+' &middot; '+tr.label+'</div>';
   h+='<div style="border-radius:10px 10px 0 0;background:'+barColor+';height:'+heights[oi]+';display:flex;align-items:flex-start;justify-content:center;padding-top:6px;font-size:18px;margin-top:6px">'+medals[oi]+'</div>';
   h+='</div>';
  });
  h+='</div>';
 }

 if(rest.length){
  h+='<div class="card" style="padding:4px 8px;margin-top:6px">';
  rest.forEach((p,ri)=>{
   let i=ri+3;
   let pIdx=names.indexOf(p.n);
   let tr=trendOf(pIdx,i);
   let gap='-'+(rank[0].s-p.s);
   let prog=Math.min(100, Math.round((p.s/((+target.value||1000)||1))*100));
   h+='<div style="display:flex;align-items:center;gap:8px;padding:8px 4px;border-bottom:1px solid #263449">';
   h+='<div style="width:26px;font-weight:bold;color:#9ca3af;text-align:center">#'+(i+1)+'</div>';
   h+='<span class="avatar" style="width:28px;height:28px;font-size:12px">'+(playerEmojis[pIdx+1]||p.n[0]||'P')+'</span>';
   h+='<div style="flex:1;min-width:0">';
   h+='<div style="display:flex;justify-content:space-between;align-items:center">';
   h+='<span style="font-weight:bold;color:'+(playerColors[pIdx+1]||'inherit')+'">'+p.n+'</span>';
   h+='<span style="font-size:11px;font-weight:bold;color:'+tr.color+';white-space:nowrap">'+tr.label+'</span>';
   h+='</div>';
   h+='<div style="display:flex;justify-content:space-between;font-size:11px;opacity:.8"><span>'+p.s+' pts</span><span>'+gap+'</span></div>';
   h+='<progress value="'+prog+'" max="100" style="width:100%;height:6px;margin-top:2px"></progress>';
   h+='</div></div>';
  });
  h+='</div>';
 }
}
renderHistoryModal();
renderTieCard(isTie, topIdxs, maxScore);
if(winner>=0){
 if(!winnerShown){
   winnerShown=true;
   showToast(names[winner]+' জয়ী হয়েছেন! 🏆','🎉');
   playWinnerSound();
   speak(names[winner]+' খেলায় জয়ী হয়েছেন! অভিনন্দন!');
   setTimeout(()=>{
      const m=document.getElementById('winnerModal');
      document.getElementById('winnerText').innerHTML='<b>'+names[winner]+'</b><br>Score: '+totals[winner]+'<br>Target: '+target.value+'<hr style="margin:10px 0"><div style="text-align:left;font-size:14px">'+generateFinalMatchStory(winner)+'</div>';
      m.style.display='block';
   },100);
 }
}
 document.getElementById('board').innerHTML=h;
}

setInterval(()=>{ try{ render(); }catch(e){} },1000);
</script>

function refreshUniqueSelectors(){
  const names=[...document.querySelectorAll('select.nameSel')];
  names.forEach((s,i)=>{
    const current=s.value;
    const used=names.map(x=>x.value).filter(v=>v && v!==current);
    [...s.options].forEach(o=>{
      if(o.value==='' ) return;
      o.hidden=used.includes(o.value);
    });
  });
}
document.addEventListener('change',e=>{
 if(e.target.classList.contains('nameSel')) refreshUniqueSelectors();
});
